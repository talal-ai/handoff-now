name: Pages

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml", "assets/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site assets
        run: |
          cp assets/logo.svg site/logo.svg
          cp assets/social-preview.png site/social-preview.png
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
